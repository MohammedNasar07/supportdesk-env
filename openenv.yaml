name: supportdesk-env
version: "1.0.0"
description: >
  Customer Support Ticket Triage: AI agent reads inbound support tickets
  and classifies, prioritizes, routes, and drafts responses.

tags: [openenv, support, triage, classification, nlp, real-world]

tasks:
  - name: classify
    description: "Classify the ticket into the correct category"
    difficulty: easy
    max_steps: 4
    required_actions: [classify, submit]

  - name: triage
    description: "Classify, set priority, and route the ticket"
    difficulty: medium
    max_steps: 6
    required_actions: [classify, set_priority, route, submit]

  - name: resolve
    description: "Full triage plus draft a professional customer response"
    difficulty: hard
    max_steps: 8
    required_actions: [classify, set_priority, route, draft_response, submit]

reward:
  type: dense
  range: [0.0, 1.0]

endpoints:
  health: GET  /health
  tasks:  GET  /tasks
  reset:  POST /reset
  step:   POST /step
  state:  GET  /state

docker:
  port: 7860
