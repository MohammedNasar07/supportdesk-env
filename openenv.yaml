name: supportdesk-env
version: "1.0.0"
description: >
  Customer Support Ticket Triage: AI agent reads inbound support tickets
  and classifies, prioritizes, routes, and drafts responses.

tags: [openenv, support, triage, classification, nlp, real-world, scaler-hackathon, pytorch]

tasks:
  - id: classify
    name: classify
    description: "Classify the ticket into the correct category"
    difficulty: easy
    grader: "tasks.classify.grader:grade"

  - id: triage
    name: triage
    description: "Classify, set priority, and route the ticket"
    difficulty: medium
    grader: "tasks.triage.grader:grade"

  - id: resolve
    name: resolve
    description: "Full triage plus draft a professional customer response"
    difficulty: hard
    grader: "tasks.resolve.grader:grade"

reward:
  type: dense
  range: [0.0, 1.0]

endpoints:
  health: GET  /health
  tasks:  GET  /tasks
  reset:  POST /reset
  step:   POST /step
  state:  GET  /state

docker:
  port: 7860
